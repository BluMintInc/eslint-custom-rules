name: Fix ESLint Rule Bug

on:
  issues:
    types: [labeled, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: claude-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  fix_bug:
    if: |
      ((github.event.action == 'labeled' && github.event.label.name == 'claude-fix') ||
       (github.event.action == 'reopened' && contains(github.event.issue.labels.*.name, 'claude-fix'))) &&
      contains(github.event.issue.labels.*.name, 'bug')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute variables and build prompt
        id: vars
        run: |
          set -euo pipefail
          ISSUE_NUMBER='${{ github.event.issue.number }}'
          DEFAULT_REF='develop'

          # Fetch issue details
          ISSUE_JSON=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER)
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body // ""')

          # Derive target branch
          TARGET_BRANCH="develop-fix-bug-$ISSUE_NUMBER"

          # Build prompt by copying command file and appending issue details
          PROMPT_FILE=/tmp/fix-prompt.txt

          # Copy the fix-bug command (no rule-request flag for bug fixes)
          cat .claude/agents/fix-bug.md > "$PROMPT_FILE"

          # Append issue-specific details safely (no shell expansion of issue text)
          cat >> "$PROMPT_FILE" <<'PROMPT_ISSUE'

          ---

          ## Bug to Fix

          PROMPT_ISSUE

          printf '**Issue #%s**: %s\n\n%s\n\n' "$ISSUE_NUMBER" "$ISSUE_TITLE" "$ISSUE_BODY" >> "$PROMPT_FILE"

          cat >> "$PROMPT_FILE" <<'PROMPT_ISSUE'
          ---

          When complete, open a PR targeting the \`develop\` branch.
          When you open the GitHub pull request for this work, do not open it as a draft. Create an open, ready-for-review PR.
          PROMPT_ISSUE

          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "prompt_path=$PROMPT_FILE" >> "$GITHUB_OUTPUT"

      - name: Create and checkout target branch
        run: git checkout -b ${{ steps.vars.outputs.target_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Bug Fix Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: ${{ steps.vars.outputs.prompt_path }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,Task"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Comment on issue with agent status
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="🔧 Launched Claude Bug Fix Agent to fix bug from issue #${{ github.event.issue.number }}."
