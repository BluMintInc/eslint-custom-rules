name: Release
on:
  push:
    branches:
      - main
permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  id-token: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Upgrade npm for trusted publishing (npm 11.5.1 or higher)
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm ci && npm run remove-hooks
      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures
      - name: Build
        run: npm run build
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          # Cross-repo token (contents:write or repository-dispatch on BluMintInc/agora)
          # consumed by the @semantic-release/exec successCmd → scripts/dispatch-agora-release.js.
          # Optional: if unset, the dispatch is skipped and agora's dependabot is the backstop.
          AGORA_DISPATCH_TOKEN: ${{ secrets.AGORA_DISPATCH_TOKEN }}
        run: npx semantic-release
